# Hermes SDK Spring Boot 配置
spring:
  application:
    name: hermes-sdk

# Hermes 配置
hermes:
  base-url: http://localhost:8080
  api-key: your-api-key-here
  model: gpt-4
  temperature: 0.7
  max-tokens: 4096
  connect-timeout: 30
  read-timeout: 180

# Server 配置（Spring Boot 2.x）
server:
  port: 8081

# 日志配置
logging:
  level:
    com.hermes.sdk: INFO
    okhttp3: WARN